<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WasmWine - Ultra Low-Level Windows Runtime</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --term-color: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            color: var(--text-color);
            overflow: hidden;
        }

        #container {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }

        /* WebGPUのレンダリングターゲット（ゲーム画面） */
        #gpu-canvas {
            flex: 1;
            width: 100%;
            height: 70%;
            background-color: #000;
            display: block;
        }

        /* 開発用・低レイヤシステムログ表示エリア */
        #system-log-panel {
            height: 30%;
            background-color: var(--term-color);
            border-top: 1px solid #30363d;
            box-sizing: border-box;
            padding: 10px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 12px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .status-header {
            padding: 8px 12px;
            background-color: #21262d;
            border-bottom: 1px solid #30363d;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            background-color: var(--accent-color);
            color: #fff;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="container">
        <div class="status-header">
            <div><strong>WasmWine Runtime v0.1.0</strong> (x86_64 -> WebAssembly/WebGPU)</div>
            <div>Status: <span class="badge" id="runtime-status">BOOTING</span></div>
        </div>

        <canvas id="gpu-canvas"></canvas>

        <div id="system-log-panel" id="log-output">
[SYS] Initializing multi-memory architecture (16GB Virtual Address Mapping)...
[SYS] SharedArrayBuffer allocated. COOP/COEP verified via vercel.json headers.
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
